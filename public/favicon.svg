<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#4f46e5"/>
  
  <!-- Musical note in white -->
  <g fill="white">
    <!-- Note head 1 (lower) -->
    <ellipse cx="20" cy="42" rx="5" ry="6" transform="rotate(-20 20 42)"/>
    <!-- Note head 2 (upper) -->
    <ellipse cx="35" cy="28" rx="5" ry="6" transform="rotate(-20 35 28)"/>
    <!-- Stem -->
    <rect x="38" y="15" width="2.5" height="28" rx="1.25"/>
    <!-- Beam connecting notes -->
    <path d="M 40.5 15 Q 40 22 38 28 L 35.5 27 Q 37 22 37.5 15" fill="white"/>
  </g>
</svg>
