name: Deploy to one.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight check
        id: preflight
        run: |
          if [[ -f "package.json" && -f "package-lock.json" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Node project detected. Running build and deploy."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping build/deploy: missing package.json and/or package-lock.json."
          fi

      - name: Setup Node
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.preflight.outputs.ready == 'true'
        run: npm ci

      - name: Build static site
        if: steps.preflight.outputs.ready == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install SSH deploy tooling
        if: steps.preflight.outputs.ready == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Deploy via SSH rsync
        if: steps.preflight.outputs.ready == 'true'
        env:
          ONECOM_HOST: ${{ secrets.ONECOM_HOST }}
          ONECOM_USERNAME: ${{ secrets.ONECOM_USERNAME }}
          ONECOM_PASSWORD: ${{ secrets.ONECOM_PASSWORD }}
          ONECOM_PORT: ${{ secrets.ONECOM_PORT || 22 }}
          ONECOM_REMOTE_PATH: ${{ secrets.ONECOM_REMOTE_PATH || '/' }}
        run: |
          REMOTE_PATH="$ONECOM_REMOTE_PATH"
          if [ -z "$REMOTE_PATH" ] || [ "$REMOTE_PATH" = "/" ]; then
            REMOTE_PATH="/customers/5/0/1/ingve.com/httpd.www"
          fi

          sshpass -p "$ONECOM_PASSWORD" rsync -avz --delete \
            -e "ssh -p $ONECOM_PORT -o StrictHostKeyChecking=no" \
            ./out/ "$ONECOM_USERNAME@$ONECOM_HOST:$REMOTE_PATH"

      - name: Workflow notice
        if: steps.preflight.outputs.ready != 'true'
        run: |
          echo "Workflow completed without deploy."
          echo "Add project files and push again when app scaffolding is ready."
